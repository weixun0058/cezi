<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸葛神算 - 每日黄历</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/huangli.css') }}">
</head>
<body>
    <div class="ancient-bg huangli-bg">
        <div class="scroll-container">
            <div class="scroll-header"></div>
            <div class="scroll-content">
                <h1 class="title">诸葛神算 - 每日黄历</h1>
                
                <div class="nav-links">
                    <a href="/" class="ancient-btn small-btn">返回首页</a>
                    <a href="/suanshi" class="ancient-btn small-btn">算事</a>
                    <a href="/lunming" class="ancient-btn small-btn">论命</a>
                </div>
                
                <div class="date-selector">
                    <button id="prevDayBtn" class="ancient-btn small-btn">前一天</button>
                    <input type="date" id="datePicker" class="date-picker">
                    <div id="currentDate" class="current-date"></div>
                    <button id="nextDayBtn" class="ancient-btn small-btn">后一天</button>
                    <button id="todayBtn" class="ancient-btn small-btn">今天</button>
                </div>
                
                <div class="huangli-container">
                    <div class="huangli-header">
                        <div class="date-info">
                            <div id="solarDate" class="solar-date"></div>
                            <div id="lunarDate" class="lunar-date"></div>
                        </div>
                        <div class="zodiac-info">
                            <div id="ganZhi" class="gan-zhi"></div>
                            <div id="zodiac" class="zodiac"></div>
                            <div id="starSign" class="star-sign"></div>
                        </div>
                    </div>
                    
                    <div class="huangli-content">
                        <div class="huangli-section">
                            <h3>今日宜</h3>
                            <div id="suitable" class="suitable-list"></div>
                        </div>
                        
                        <div class="huangli-section">
                            <h3>今日忌</h3>
                            <div id="unsuitable" class="unsuitable-list"></div>
                        </div>
                        
                        <div class="huangli-section">
                            <h3>吉祥信息</h3>
                            <div class="lucky-info">
                                <div class="lucky-item">
                                    <span class="lucky-label">吉方位：</span>
                                    <span id="luckyDirection" class="lucky-value"></span>
                                </div>
                                <div class="lucky-item">
                                    <span class="lucky-label">吉祥色：</span>
                                    <span id="luckyColor" class="lucky-value"></span>
                                </div>
                                <div class="lucky-item">
                                    <span class="lucky-label">幸运数字：</span>
                                    <span id="luckyNumber" class="lucky-value"></span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="huangli-section">
                            <h3>神煞信息</h3>
                            <div class="shen-sha-info">
                                <div class="shen-sha-item">
                                    <span class="shen-sha-label">冲煞：</span>
                                    <span id="chongSha" class="shen-sha-value"></span>
                                </div>
                                <div class="shen-sha-item">
                                    <span class="shen-sha-label">吉神：</span>
                                    <span id="jiShen" class="shen-sha-value"></span>
                                </div>
                                <div class="shen-sha-item">
                                    <span class="shen-sha-label">凶神：</span>
                                    <span id="xiongShen" class="shen-sha-value"></span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="huangli-section">
                            <h3>今日运势</h3>
                            <div id="dayFortune" class="day-fortune"></div>
                        </div>
                        
                        <div id="solarTermSection" class="huangli-section solar-term-section hidden">
                            <h3>节气</h3>
                            <div class="solar-term-info">
                                <div id="solarTermName" class="solar-term-name"></div>
                                <div id="solarTermDesc" class="solar-term-desc"></div>
                            </div>
                        </div>
                        
                        <div id="festivalSection" class="huangli-section festival-section hidden">
                            <h3>传统节日</h3>
                            <div id="festivalList" class="festival-list"></div>
                        </div>
                    </div>
                </div>
                
                <div class="week-preview">
                    <h3>一周黄历预览</h3>
                    <div id="weekHuangliContainer" class="week-container"></div>
                </div>
                
                <div class="huangli-footer">
                    <p>黄历数据仅供参考，吉凶祸福，尽在人为。</p>
                </div>
            </div>
            <div class="scroll-footer"></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/huangli.js') }}"></script>
</body>
</html>
