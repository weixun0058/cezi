<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸葛神算 - 传统黄历</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/huangli.css') }}">
</head>
<body>
    <div class="ancient-bg">
        <div class="scroll-container">
            <div class="scroll-header"></div>
            <div class="scroll-content">
                <h1 class="title">黄历</h1>
                
                <div class="nav-links">
                    <a href="/suanshi" class="ancient-btn nav-btn">算事</a>
                    <a href="/lunming" class="ancient-btn nav-btn">论命</a>
                </div>
                
                <div class="poetry-section">
                    <div class="poetry-container">
                        <div class="poem-line" style="animation-delay: 0.1s">日月星辰运行间</div>
                        <div class="poem-line" style="animation-delay: 0.3s">吉凶祸福皆有源</div>
                        <div class="poem-line" style="animation-delay: 0.5s">黄历记载天地理</div>
                        <div class="poem-line" style="animation-delay: 0.7s">顺应时节得安然</div>
                    </div>
                </div>
                <div class="divider">
                    <span class="cloud-pattern"></span>
                </div>
                
                <div class="date-controls">
                    <button id="prevDayBtn" class="btn btn-primary">前一天</button>
                    <input type="date" id="datePicker" class="date-picker">
                    <button id="nextDayBtn" class="btn btn-primary">后一天</button>
                    <button id="todayBtn" class="btn btn-primary">今天</button>
                </div>
                
                <div class="huangli-container">
                    <div class="huangli-header">
                        <h3 id="currentDate">加载中...</h3>
                        <div id="currentTime" class="current-time">当前时辰: 加载中...</div>
                    </div>
                    
                    <div class="huangli-content">
                        <!-- 顶部区域：日期信息和节气节日 -->
                        <div class="huangli-top-row">
                            <!-- 日期信息卡片 -->
                            <div class="info-card date-info">
                                <h4 class="card-title">日期信息</h4>
                                <div class="info-grid">
                                    <div class="info-item solar-date">
                                        <span class="label">阳历：</span>
                                        <span id="solarDate">加载中...</span>
                                    </div>
                                    <div class="info-item lunar-date">
                                        <span class="label">农历：</span>
                                        <span id="lunarDate">加载中...</span>
                                    </div>
                                    <div class="info-item gan-zhi">
                                        <span class="label">干支：</span>
                                        <span id="ganZhi">加载中...</span>
                                    </div>
                                    <div class="info-item gan-zhi-hour">
                                        <span class="label">时辰：</span>
                                        <span id="ganZhiHour">加载中...</span>
                                    </div>
                                    <div class="info-item zodiac">
                                        <span class="label">生肖：</span>
                                        <span id="zodiac">加载中...</span>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 节气与节日卡片 -->
                            <div class="info-card solar-term-section" id="solarTermSection">
                                <h4 class="card-title">节气与节日</h4>
                                <div class="info-grid">
                                    <div class="info-item solar-term">
                                        <span class="label">节气：</span>
                                        <span id="solarTermName">加载中...</span>
                                    </div>
                                    <div class="info-item festival">
                                        <span class="label">节日：</span>
                                        <div id="festivalList" class="festival-list">
                                            加载中...
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 中部区域：宜忌 -->
                        <div class="huangli-middle-row">
                            <!-- 宜忌卡片 -->
                            <div class="info-card yi-ji-section">
                                <h4 class="card-title">今日宜忌</h4>
                                <div class="suitable-unsuitable">
                                    <div class="suitable-section">
                                        <h5>宜</h5>
                                        <div id="suitable" class="tag-container">
                                            加载中...
                                        </div>
                                    </div>
                                    <div class="unsuitable-section">
                                        <h5>忌</h5>
                                        <div id="unsuitable" class="tag-container">
                                            加载中...
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 底部区域：神煞信息和彭祖百忌 -->
                        <div class="huangli-bottom-row">
                            <!-- 神煞信息卡片 -->
                            <div class="info-card shen-sha-section">
                                <h4 class="card-title">神煞信息</h4>
                                <div class="shen-sha-info">
                                    <div class="shen-sha-row">
                                        <div class="shen-sha-item">
                                            <span class="label">冲煞：</span>
                                            <span id="chongSha">加载中...</span>
                                        </div>
                                    </div>
                                    
                                    <div class="shen-sha-row">
                                        <div class="shen-sha-item">
                                            <span class="label">喜神：</span>
                                            <span id="xiShen">加载中...</span>
                                        </div>
                                        <div class="shen-sha-item">
                                            <span class="label">福神：</span>
                                            <span id="fuShen">加载中...</span>
                                        </div>
                                        <div class="shen-sha-item">
                                            <span class="label">财神：</span>
                                            <span id="caiShen">加载中...</span>
                                        </div>
                                    </div>
                                    
                                    <div class="shen-sha-row ji-xiong-row">
                                        <div class="shen-sha-column">
                                            <div class="shen-sha-item">
                                                <span class="label">吉神：</span>
                                                <span id="jiShen">加载中...</span>
                                            </div>
                                        </div>
                                        <div class="shen-sha-column">
                                            <div class="shen-sha-item">
                                                <span class="label">凶神：</span>
                                                <span id="xiongShen">加载中...</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 彭祖百忌卡片 -->
                            <div class="info-card peng-zu-section">
                                <h4 class="card-title">彭祖百忌</h4>
                                <div id="pengZuBaiJi" class="peng-zu-bai-ji">
                                    加载中...
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="week-huangli">
                    <h3>九天黄历</h3>
                    <div id="weekHuangliContainer" class="week-container">
                        <!-- 九天黄历数据将通过JavaScript动态加载 -->
                        <div class="loading">加载中...</div>
                    </div>
                </div>
            </div>
            <div class="scroll-footer"></div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/huangli.js') }}"></script>
</body>
</html>
