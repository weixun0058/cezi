<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸葛神算 - 论命</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/lunming.css') }}">
    <link rel="stylesheet" media="screen and (min-width: 481px)" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" media="screen and (max-width: 480px)" href="{{ url_for('static', filename='css/style_mobile.css') }}">
    <script src="{{ url_for('static', filename='js/lunar_date_handler.js') }}"></script>
    <script src="{{ url_for('static', filename='js/lunar.js') }}"></script>
    <style>
        /* 日期选择器样式，与黄历页面保持一致 */
        .date-picker {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
        }
        
        /* 阴历日期选择器样式 */
        .lunar-date-select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            margin-right: 5px;
        }
        
        /* 日历类型选择器样式 */
        .calendar-type-selection {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .calendar-type-label {
            margin-right: 10px;
            display: flex;
            align-items: center;
        }
        
        /* 日期输入区域样式 */
        .date-input-container {
            margin-top: 10px;
        }
        
        .date-input-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .date-input-row > * {
            margin-right: 5px;
            margin-bottom: 5px;
        }
        
        /* 响应式调整 */
        @media screen and (max-width: 480px) {
            .date-input-row {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .date-input-row > * {
                margin-bottom: 10px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="ancient-bg">
        <div class="scroll-container">
            <div class="scroll-header"></div>
            <div class="scroll-content">
                <h1 class="title">论命</h1>
                
                <div class="nav-links">
                    <a href="/" class="ancient-btn nav-btn">黄历</a>
                    <a href="/suanshi" class="ancient-btn nav-btn">算事</a>
                </div>
                
                <div class="poetry-section">
                    <div class="poetry-container">
                        <div class="poem-line" style="animation-delay: 0.1s">命由天定亦由人</div>
                        <div class="poem-line" style="animation-delay: 0.3s">一线生机在己身</div>
                        <div class="poem-line" style="animation-delay: 0.5s">若问前程如何算</div>
                        <div class="poem-line" style="animation-delay: 0.7s">且看八字定乾坤</div>
                    </div>
                </div>
                <div class="divider">
                    <span class="cloud-pattern"></span>
                </div>
                
                <div class="intro-text">
                    <p class="tou">八字命理，源自中国传统文化，通过分析一个人出生时的年、月、日、时四柱天干地支，推测其命运走向。</p>
                    <p class="tou">本系统结合传统命理学与现代科技，为您提供个性化的命理分析，包括八字命盘、命理特征、大运走势等多方面内容。</p>
                    <p class="tou">请在下方填写您的基本信息，系统将为您生成详细的命理报告。</p>
                </div>
                
                <div class="lunming-form-container">
                    <div class="lunming-form">
                        <div class="form-group">
                            <label for="name">姓名：</label>
                            <input type="text" id="name" class="ancient-input" placeholder="请输入您的姓名">
                            <div class="gender-selection">
                                <label class="gender-label">
                                    <input type="radio" name="gender" value="男" checked>
                                    <span class="gender-text">男</span>
                                </label>
                                <label class="gender-label">
                                    <input type="radio" name="gender" value="女">
                                    <span class="gender-text">女</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <div class="date-input-container">
                                <!-- 公历日期输入 -->
                                <div id="solar-date-container" class="date-input-row">
                                    <label for="birth-date">公历日期：</label>
                                    <input type="date" id="birth-date" class="date-picker" min="0001-01-01" max="9999-12-31">
                                </div>
                                
                                <!-- 农历日期输入 -->
                                <div id="lunar-date-container" class="date-input-row">
                                    <label for="lunar-year">农历日期：</label>
                                    <input type="number" id="lunar-year" class="lunar-date-select" placeholder="年" min="1900" max="2100">
                                    <select id="lunar-month" class="lunar-date-select">
                                        <option value="">请选择月份</option>
                                    </select>
                                    <select id="lunar-day" class="lunar-date-select">
                                        <option value="">请选择日期</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="birth-time">出生时间：</label>
                            <input type="time" id="birth-time" class="ancient-input">
                        </div>
                        
                        <div class="form-actions">
                            <button id="analyze-btn" class="ancient-btn">开始分析</button>
                            <button id="reset-btn" class="ancient-btn secondary-btn">重置</button>
                        </div>
                    </div>
                </div>
                
                <!-- 结果区域 -->
                <div id="result-container" class="result-container hidden">
                    <!-- 加载指示器 -->
                    <div id="loading-container" class="loading-container">
                        <div class="loading-spinner"></div>
                        <span>正在分析，请稍候...</span>
                    </div>
                    
                    <!-- 分析内容 -->
                    <div id="analysis-content" class="analysis-content"></div>
                </div>
                
            </div>
            <div class="scroll-footer"></div>
        </div>
    </div>
    
    <!-- 引入论命功能的JavaScript文件 -->
    <script src="{{ url_for('static', filename='js/lunming.js') }}"></script>
    <!-- 引入日期输入处理工具 -->
    <script src="{{ url_for('static', filename='js/date_input_handler.js') }}"></script>
    <!-- 引入阴阳历日期处理工具 -->
    <script src="{{ url_for('static', filename='js/lunar_date_handler.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化日期输入框
            const birthDateInput = document.getElementById('birth-date');
            setupDateInput(birthDateInput, function(selectedDate) {
                console.log('日期已更新:', selectedDate);
                // 这里可以添加日期变更后的处理逻辑
            });
        });
    </script>
</body>
</html>
