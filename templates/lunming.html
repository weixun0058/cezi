<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸葛神算 - 论命</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/lunming.css') }}">
    <link rel="stylesheet" media="screen and (min-width: 481px)" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" media="screen and (max-width: 480px)" href="{{ url_for('static', filename='css/style_mobile.css') }}">
    <!-- <script src="{{ url_for('static', filename='js/lunar_date_handler.js') }}"></script> -->
    <script src="{{ url_for('static', filename='js/lunar.js') }}"></script>
</head>
<body>
    <div class="ancient-bg">
        <div class="scroll-container">
            <div class="scroll-header"></div>
            <div class="scroll-content">
                <h1 class="title">论命</h1>
                
                <div class="nav-links">
                    <a href="/" class="ancient-btn nav-btn">黄历</a>
                    <a href="/suanshi" class="ancient-btn nav-btn">算事</a>
                </div>
                
                <div class="poetry-section">
                    <div class="poetry-container">
                        <div class="poem-line" style="animation-delay: 0.1s">命由天定亦由人</div>
                        <div class="poem-line" style="animation-delay: 0.3s">一线生机在己身</div>
                        <div class="poem-line" style="animation-delay: 0.5s">若问前程如何算</div>
                        <div class="poem-line" style="animation-delay: 0.7s">且看八字定乾坤</div>
                    </div>
                </div>
                <div class="divider">
                    <span class="cloud-pattern"></span>
                </div>
                
                <div class="intro-text">
                    <p class="tou">八字命理，源自中国传统文化，通过分析一个人出生时的年、月、日、时四柱天干地支，推测其命运走向。</p>
                    <p class="tou">本系统结合传统命理学与现代科技，为您提供个性化的命理分析，包括八字命盘、命理特征、大运走势等多方面内容。</p>
                    <p class="tou">请在下方填写您的基本信息，系统将为您生成详细的命理报告。</p>
                </div>
                
                <div class="lunming-form-container">
                    <div class="lunming-form" id="lunming-form">
                        <!-- 基本信息区域 -->
                        <div class="form-section">
                            <h3 class="section-title">基本信息</h3>
                            <div class="form-group">
                                <label for="name">姓名：</label>
                                <input type="text" id="name" class="ancient-input name-input" maxlength="30" autocomplete="name" placeholder="请输入您的姓名">
                                <div class="gender-selection">
                                    <label class="gender-label">
                                        <input type="radio" name="gender" value="男" checked>
                                        <span class="gender-text">男</span>
                                    </label>
                                    <label class="gender-label">
                                        <input type="radio" name="gender" value="女">
                                        <span class="gender-text">女</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 出生日期区域 -->
                        <div class="form-section">
                            <h3 class="section-title">出生日期</h3>
                            <div class="date-input-container">
                                <!-- 公历日期输入 -->
                                <div class="date-group">
                                    <div class="date-label">公历日期：</div>
                                    <div class="date-input-row">
                                        <div class="date-field">
                                            <input type="date" id="birth-date" class="date-picker" min="0001-01-01" max="9999-12-31">
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- 农历日期输入 -->
                                <div class="date-group">
                                    <div class="date-label">农历日期：</div>
                                    <div id="lunar-date-container" class="date-input-row">
                                        <div class="date-field lunar-year-field">
                                            <div class="lunar-year-input-container">
                                                <input type="number" id="lunar-year" class="lunar-date-select lunar-year-input" 
                                                       placeholder="年" min="1900" max="2050" step="1"
                                                       data-ganzhi="">
                                                <span class="lunar-year-ganzhi" id="year-ganzhi-display"></span>
                                                <div class="year-picker-icon" id="year-picker-icon">▼</div>
                                                <div class="year-dropdown" id="year-dropdown"></div>
                                            </div>
                                        </div>
                                        
                                        <div class="date-field">
                                            <select id="lunar-month" class="lunar-date-select">
                                                <option value="">请选择月份</option>
                                            </select>
                                        </div>
                                        
                                        <div class="date-field">
                                            <select id="lunar-day" class="lunar-date-select">
                                                <option value="">请选择日期</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 出生时辰区域 -->
                        <div class="form-section">
                            <h3 class="section-title">出生时辰</h3>
                            <div class="form-group">
                                <label for="birth-time">时辰：</label>
                                <select id="birth-time" class="lunar-date-select time-select">
                                    <option value="">请选择时辰</option>
                                    <option value="未知">时辰未知</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3 class="section-title">出生地与时间</h3>
                            <div class="form-group location-fields">
                                <label for="birth-place">出生地：</label>
                                <input type="text" id="birth-place" class="ancient-input" maxlength="80" placeholder="选填，仅用于报告备注">
                                <label for="timezone">时区：</label>
                                <select id="timezone" class="lunar-date-select">
                                    <option value="Asia/Shanghai">中国标准时间</option>
                                    <option value="Asia/Hong_Kong">香港时间</option>
                                    <option value="Asia/Taipei">台北时间</option>
                                    <option value="Asia/Singapore">新加坡时间</option>
                                    <option value="UTC">UTC</option>
                                </select>
                            </div>
                            <label class="setting-toggle" for="use-true-solar-time">
                                <input type="checkbox" id="use-true-solar-time">
                                <span>启用真太阳时修正</span>
                            </label>
                            <div class="form-group hidden" id="longitude-group">
                                <label for="longitude">出生地经度：</label>
                                <input type="number" id="longitude" class="ancient-input" min="-180" max="180" step="0.01" placeholder="例如 116.40">
                            </div>
                        </div>
                        
                        <!-- 操作按钮区域 -->
                        <div class="form-actions">
                            <button type="button" id="analyze-btn" class="ancient-btn primary-btn">开始分析</button>
                            <button type="button" id="reset-btn" class="ancient-btn secondary-btn">重置</button>
                        </div>
                        <div id="form-status" class="inline-status" role="status" aria-live="polite"></div>
                    </div>
                </div>
                
                <!-- 结果区域 -->
                <div id="result-container" class="result-container hidden">
                    <!-- 加载指示器 -->
                    <div id="loading-container" class="loading-container">
                        <div class="loading-spinner"></div>
                        <span>正在分析，请稍候...</span>
                    </div>
                    <div id="chart-summary" class="chart-summary hidden"></div>
                    <!-- 分析内容 -->
                    <div id="analysis-content" class="analysis-content"></div>
                    <p class="responsible-use-notice">传统文化娱乐参考，不构成医疗、投资或人生决策建议。</p>
                </div>

                <section class="local-history" aria-labelledby="history-title">
                    <h2 id="history-title" class="section-title">本地报告</h2>
                    <p class="privacy-note">报告仅保存在当前浏览器，可随时删除或导出。</p>
                    <div class="history-actions">
                        <button type="button" id="export-reports" class="ancient-btn secondary-btn">导出</button>
                        <button type="button" id="clear-reports" class="ancient-btn secondary-btn">全部清除</button>
                    </div>
                    <div id="report-history" class="report-history"></div>
                </section>
                
            </div>
            <div class="scroll-footer"></div>
        </div>
    </div>
    
    <!-- 引入论命功能的JavaScript文件 -->
    <script src="{{ url_for('static', filename='js/lunming.js') }}"></script>
    <!-- 引入日期输入处理工具 -->
    <script src="{{ url_for('static', filename='js/date_input_handler.js') }}"></script>
    <!-- 引入阴阳历日期处理工具 -->
    <script src="{{ url_for('static', filename='js/lunar_date_handler.js') }}"></script>
</body>
</html>
