<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>诸葛神算 - 论命</title>
    <link rel="stylesheet" media="screen and (min-width: 481px)" href="/static/css/style.css">
    <link rel="stylesheet" media="screen and (max-width: 480px)" href="/static/css/style_mobile.css">
    <link rel="stylesheet" href="/static/css/lunming.css">
</head>
<body>
    <div class="ancient-bg">
        <div class="scroll-container">
            <div class="scroll-header"></div>
            <div class="scroll-content">
                <h1 class="title">论命</h1>
                
                <div class="nav-links">
                    <a href="/" class="ancient-btn nav-btn">黄历</a>
                    <a href="/suanshi" class="ancient-btn nav-btn">算事</a>
                </div>
                
                <div class="poetry-section">
                    <div class="poetry-container">
                        <div class="poem-line" style="animation-delay: 0.1s">命由天定亦由人</div>
                        <div class="poem-line" style="animation-delay: 0.3s">一线生机在己身</div>
                        <div class="poem-line" style="animation-delay: 0.5s">若问前程如何算</div>
                        <div class="poem-line" style="animation-delay: 0.7s">且看八字定乾坤</div>
                    </div>
                </div>
                <div class="divider">
                    <span class="cloud-pattern"></span>
                </div>
                
                <div class="intro-text">
                    <p class="tou">八字命理，源自中国传统文化，通过分析一个人出生时的年、月、日、时四柱天干地支，推测其命运走向。</p>
                    <p class="tou">本系统结合传统命理学与现代科技，为您提供个性化的命理分析，包括八字命盘、命理特征、大运走势等多方面内容。</p>
                    <p class="tou">请在下方填写您的基本信息，系统将为您生成详细的命理报告。</p>
                </div>
                
                <div class="lunming-form-container">
                    <div class="lunming-form">
                        <div class="form-group">
                            <label for="name">姓名：</label>
                            <input type="text" id="name" class="ancient-input" placeholder="请输入您的姓名">
                        </div>
                        
                        <div class="form-group">
                            <label>性别：</label>
                            <div class="gender-selection">
                                <label class="gender-label">
                                    <input type="radio" name="gender" value="男" checked>
                                    <span class="gender-text">男</span>
                                </label>
                                <label class="gender-label">
                                    <input type="radio" name="gender" value="女">
                                    <span class="gender-text">女</span>
                                </label>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="birth-date">出生日期：</label>
                            <input type="date" id="birth-date" class="ancient-input">
                        </div>
                        
                        <div class="form-group">
                            <label for="birth-time">出生时间：</label>
                            <input type="time" id="birth-time" class="ancient-input">
                        </div>
                        
                        <div class="form-actions">
                            <button id="analyze-btn" class="ancient-btn">开始分析</button>
                            <button id="reset-btn" class="ancient-btn secondary-btn">重置</button>
                        </div>
                    </div>
                </div>
                
                <div id="loading-container" class="hidden">
                    <div class="loading-animation">
                        <div class="loading-text">正在推演命理，请稍候...</div>
                        <div class="loading-spinner"></div>
                    </div>
                </div>
                
                <div id="result-container" class="hidden">
                    <div class="divider">
                        <span class="cloud-pattern"></span>
                    </div>
                    
                    <h2 class="result-title">命理分析结果</h2>
                    
                    <div id="analysis-content" class="analysis-content">
                        <!-- 分析结果将通过JavaScript动态插入 -->
                    </div>
                </div>
                
            </div>
            <div class="scroll-footer"></div>
        </div>
    </div>
    
    <!-- 引入论命功能的JavaScript文件 -->
    <script src="/static/js/lunming.js"></script>
</body>
</html>
